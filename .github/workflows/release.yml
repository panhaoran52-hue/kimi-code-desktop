name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0. Defaults to package.json version."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"

jobs:
  windows-msi:
    name: Windows MSI
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Kimi CLI runtime
        shell: pwsh
        run: uv tool install kimi-cli --python $env:PYTHON_VERSION

      - name: Install Node dependencies
        run: npm ci

      - name: Build MSI release
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/release-msi.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kimi-code-desktop-windows-msi
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/SHA256SUMS.txt
            src-tauri/target/release/bundle/msi/release-manifest.json
            src-tauri/target/release/kimi-code-desktop.release.json
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $tag = if ("${{ github.ref_type }}" -eq "tag") {
            "${{ github.ref_name }}"
          } elseif (-not [string]::IsNullOrWhiteSpace($env:INPUT_TAG)) {
            $env:INPUT_TAG.Trim()
          } else {
            "v$($package.version)"
          }

          $bundleDir = Join-Path $PWD "src-tauri\target\release\bundle\msi"
          $files = @()
          $files += Get-ChildItem -Path $bundleDir -Filter "*.msi" -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          $files += Get-Item (Join-Path $bundleDir "SHA256SUMS.txt")
          $files += Get-Item (Join-Path $bundleDir "release-manifest.json")
          $files += Get-Item (Join-Path $PWD "src-tauri\target\release\kimi-code-desktop.release.json")

          if ($files.Count -lt 4 -or @($files | Where-Object { -not $_ }).Count -gt 0) {
            throw "Release artifacts are incomplete."
          }

          $releaseArgs = @(
            "release", "create", $tag,
            "--target", $env:GITHUB_SHA,
            "--title", "Kimi Code $tag",
            "--notes", "Windows MSI release for Kimi Code Desktop $tag."
          )
          if ($env:INPUT_PRERELEASE -eq "true") {
            $releaseArgs += "--prerelease"
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh @releaseArgs
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create GitHub release $tag."
            }
          }

          $filePaths = @($files | ForEach-Object { $_.FullName })
          gh release upload $tag @filePaths --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload GitHub release assets for $tag."
          }
